name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [ "main" ] # Chạy khi bạn push vào nhánh main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Bạn chỉ cần 1 phiên bản Node ổn định để build
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build # Lệnh này sẽ tạo ra thư mục dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Thư mục Vite xuất ra sau khi build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
